# docker-compose.yml
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: vigiabrasil
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d vigiabrasil"]
      interval: 5s
      timeout: 5s
      retries: 5

  prefect-server:
    image: prefecthq/prefect:3-latest
    command: prefect server start --host 0.0.0.0
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/prefect
      PREFECT_UI_API_URL: https://vigiabrasil.org/prefect/api
      PREFECT_UI_SERVE_BASE: /prefect
      PREFECT_SERVER_API_AUTH_STRING: ${PREFECT_SERVER_API_AUTH_STRING}
    expose:
      - "4200"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  worker-camara:
    build: .
    command: prefect worker start --pool camara --work-queue default
    restart: on-failure
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
      PREFECT_API_AUTH_STRING: ${PREFECT_API_AUTH_STRING}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/vigiabrasil
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      X_API_KEY: ${X_API_KEY}
      X_API_SECRET: ${X_API_SECRET}
      X_ACCESS_TOKEN: ${X_ACCESS_TOKEN} 
      X_ACCESS_TOKEN_SECRET: ${X_ACCESS_TOKEN_SECRET}
    depends_on:
      deploy:
        condition: service_completed_successfully

  deploy:
    build: .
    command: sh -c "python -c 'from database.connection import setup; setup()' && prefect work-pool create camara --type process || true && prefect deploy --all"
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
      PREFECT_API_AUTH_STRING: ${PREFECT_API_AUTH_STRING}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/vigiabrasil
    depends_on:
      prefect-server:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/vigiabrasil
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/www/certbot:ro
    depends_on:
      - frontend
      - prefect-server
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew; done'"

volumes:
  pgdata:
  certbot-etc:
  certbot-var: